<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konnekt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f4ff;
    }
    .card {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 { color: #3b5bdb; margin-bottom: 0.5rem; }
    p  { color: #555; font-size: 1.1rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: #e8f0fe;
      color: #3b5bdb;
      border-radius: 999px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to Konnekt</h1>
    <p>Connect with people who share your interests.</p>
    <span class="badge">☁️ Hosted on AWS via CloudFront + S3</span>
  </div>
</body>
</html>
